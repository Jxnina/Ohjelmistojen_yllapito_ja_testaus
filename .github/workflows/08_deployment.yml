name: 08 Deployment Tests

on:
  push:
    paths:
      - '08_Deployment/**'
      - '.github/workflows/08_deployment.yml'
  pull_request:
    paths:
      - '08_Deployment/**'
      - '.github/workflows/08_deployment.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 08_Deployment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 08_Deployment/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: 08_Deployment/coverage/lcov.info
